<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SI-MANTANKU | LPKA Kutoarjo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
</head>
<body>

<header class="main-header">
    <div class="header-overlay"></div>
    
    <div class="container">
        <div class="header-wrapper">
            <div class="brand-section">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -15 150 150" width="105" height="105" class="logo-simantanku-anim">
                    <defs>
                        <style>
                            /* 1. Efek Interaktif (Diperbesar saat Hover) */
                            .logo-simantanku-anim {
                                transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), filter 0.5s ease;
                                filter: drop-shadow(0px 5px 10px rgba(0, 0, 0, 0.15));
                                cursor: pointer;
                            }
                            .logo-simantanku-anim:hover {
                                transform: scale(1.15) rotate(5deg);
                                /* Shadow hover disesuaikan menjadi warna emas terang */
                                filter: drop-shadow(0px 10px 20px rgba(245, 158, 11, 0.6));
                            }
                
                            /* 2. Animasi Garis Heksagon (Menggambar sendiri lalu berdenyut) */
                            .hex-frame {
                                stroke-dasharray: 400;
                                stroke-dashoffset: 400;
                                animation: drawHex 2s ease-in-out forwards, pulseGlow 3s infinite alternate 2.5s;
                                transform-origin: center;
                            }
                
                            /* 3. Animasi Batang (Tumbuh perlahan dari bawah) */
                            .bar {
                                transform-origin: bottom;
                                animation: growUp 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
                                transform: scaleY(0);
                            }
                            .bar-1 { animation-delay: 0.5s; }
                            .bar-2 { animation-delay: 0.7s; }
                            .bar-3 { animation-delay: 0.9s; }
                
                            /* 4. Animasi Lingkaran/Daun (Mumbul lalu Mengambang) */
                            .circle-node {
                                opacity: 0;
                                animation: popIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards, floatNode 3s ease-in-out infinite;
                                transform-origin: center;
                            }
                            .circle-1 { animation-delay: 1.0s, 1.8s; }
                            .circle-2 { animation-delay: 1.2s, 2.0s; }
                            .circle-3 { animation-delay: 1.4s, 2.2s; }
                
                            /* --- KEYFRAMES --- */
                            @keyframes drawHex {
                                to { stroke-dashoffset: 0; }
                            }
                            @keyframes pulseGlow {
                                /* Efek glow disesuaikan dengan warna emas agar kontras dengan biru */
                                0% { filter: drop-shadow(0 0 2px rgba(245, 158, 11, 0.3)); }
                                100% { filter: drop-shadow(0 0 15px rgba(253, 224, 71, 0.8)); }
                            }
                            @keyframes growUp {
                                from { transform: scaleY(0); }
                                to { transform: scaleY(1); }
                            }
                            @keyframes popIn {
                                from { opacity: 0; transform: translateY(15px) scale(0); }
                                to { opacity: 1; transform: translateY(0) scale(1); }
                            }
                            @keyframes floatNode {
                                0%, 100% { transform: translateY(0); }
                                50% { transform: translateY(-5px); }
                            }
                        </style>
                        
                        <linearGradient id="gradGold" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#fde047" />
                            <stop offset="100%" stop-color="#d97706" />
                        </linearGradient>
                        
                        <linearGradient id="gradFuchsia" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#f472b6" />
                            <stop offset="100%" stop-color="#be185d" />
                        </linearGradient>
                
                        <linearGradient id="gradCyan" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#22d3ee" />
                            <stop offset="100%" stop-color="#0f766e" />
                        </linearGradient>
                
                        <linearGradient id="gradWhite" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#ffffff" />
                            <stop offset="100%" stop-color="#94a3b8" />
                        </linearGradient>
                    </defs>
                
                    <path class="hex-frame" d="M60,5 L110,33 L110,87 L60,115 L10,87 L10,33 Z" fill="none" stroke="url(#gradGold)" stroke-width="8" stroke-linejoin="round"/>
                    
                    <g transform="translate(0, 0)">
                        <rect class="bar bar-1" x="34" y="65" width="12" height="25" rx="4" fill="url(#gradFuchsia)" />
                        <rect class="bar bar-2" x="54" y="45" width="12" height="45" rx="4" fill="url(#gradCyan)" />
                        <rect class="bar bar-3" x="74" y="25" width="12" height="65" rx="4" fill="url(#gradWhite)" />
                    </g>
                    
                    <circle class="circle-node circle-1" cx="40" cy="55" r="7" fill="#be185d" />
                    <circle class="circle-node circle-2" cx="60" cy="35" r="9" fill="#0ea5e9" />
                    <circle class="circle-node circle-3" cx="80" cy="15" r="7" fill="#ffffff" />
                </svg>

                <div class="logo-area">
                    <h1>SI-MANTANKU</h1>
                    <div class="divider"></div>
                    <p>Sistem Informasi Pemantauan Anggaran Terintegrasi <span>LPKA Kutoarjo</span></p>
                </div>
            </div>
            
            <div class="status-section">
                <div id="date-display" class="date-badge-glass">
                    <i class="far fa-calendar-alt"></i>
                    <span id="current-date">Memuat tanggal...</span>
                </div>
            </div>
        </div>
    </div>
</header>

    <main class="container">
        
        <section class="filter-section">
            <div class="filter-wrapper">
                <div class="filter-group">
                    <label for="filter-tahun">Tahun Anggaran</label>
                    <div class="select-wrapper">
                        <select id="filter-tahun">
                            <option value="Semua">Semua Tahun</option>
                        </select>
                    </div>
                </div>
                <div class="filter-group">
                    <label for="filter-bulan">Bulan</label>
                    <div class="select-wrapper">
                        <select id="filter-bulan">
                            <option value="Semua">Semua Bulan</option>
                        </select>
                    </div>
                </div>
            </div>
        </section>

        <section class="cards-section">
            <div class="card card-pagu">
                <div class="card-icon">💰</div>
                <div class="card-info">
                    <h4>Total Pagu</h4>
                    <h2 id="total-pagu" style="font-size: 1.2rem;">Rp 0</h2>
                </div>
            </div>
            <div class="card card-realisasi">
                <div class="card-icon">📈</div>
                <div class="card-info">
                    <h4>Total Realisasi</h4>
                    <h2 id="total-realisasi" style="font-size: 1.2rem;">Rp 0</h2>
                </div>
            </div>
            <div class="card card-persentase">
                <div class="card-icon">📊</div>
                <div class="card-info">
                    <h4>Persentase</h4>
                    <h2 id="total-persentase" style="font-size: 1.2rem;">0%</h2>
                </div>
            </div>
            <div class="card card-sisa">
                <div class="card-icon">💼</div>
                <div class="card-info">
                    <h4>Sisa Anggaran</h4>
                    <h2 id="total-sisa" style="font-size: 1.2rem;">Rp 0</h2>
                </div>
            </div>
        </section>

        <section class="chart-section" style="display: flex; gap: 20px; margin-bottom: 2rem; flex-wrap: wrap;">
            <div class="chart-container" style="flex: 2; min-width: 300px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
                <canvas id="trendChart"></canvas>
            </div>
            <div class="chart-container" style="flex: 1; min-width: 300px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
                <canvas id="pieChart"></canvas>
            </div>
        </section>

        <section class="table-section">
            <div class="table-header">
                <h3>Rincian Program Anggaran</h3>
            </div>
            <div class="table-responsive">
                <table id="dataTable">
                    <thead>
                    <tr>
                        <th style="width: 35%; text-align: left;">Kegiatan</th>
                        <th style="width: 20%;">Pagu</th>
                        <th style="width: 20%;">Realisasi</th>
                        <th style="width: 5%;">%</th>
                        <th style="width: 20%;">Sisa Anggaran</th>
                    </tr>
                    </thead>
                    <tbody id="table-body">
                        <tr>
                            <td colspan="5" class="state-message">
                                <div class="loader"></div>
                                <p>Menarik data dari server...</p>
                            </td>
                        </tr>
                    </tbody>
                    <tfoot id="table-foot">
                    </tfoot>
                </table>
            </div>
        </section>

    </main>

    <script src="script.js"></script>
</body>
</html>
